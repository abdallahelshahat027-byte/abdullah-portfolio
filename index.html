<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdallah Elshahat Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="lang-toggle-container">
        <button class="lang-btn" onclick="toggleLanguage()">EN / AR</button>
    </div>

    <div class="header">
        <img src="profile.jpg" alt="Profile" class="profile-img">
        <h1 data-ar="عبد الله شحات" data-en="Abdallah Elshahat">عبد الله شحات</h1>
        <h3 data-ar="مسؤول مشتريات" data-en="Procurement Officer">مسؤول مشتريات</h3>
    </div>

    <div class="summary-section">
        <p data-ar="مسؤول مشتريات استراتيجي بخبرة عملية مثبتة في إدارة المشتريات، التفاوض التعاقدي، وتحسين التكاليف. أمتلك خلفية قانونية قوية تمنحني ميزة تحليلية في إدارة العقود والمخاطر. ومتمكن من أدوات تحليل البيانات. سجل حافل في بناء شراكات استراتيجية مع الموردين، تقليل تكاليف الشراء بنسب قياسية، وضمان كفاءة المخزون بأعلى معايير الجودة." 
           data-en="Strategic Procurement Officer with proven hands-on experience in procurement management, contract negotiation, and cost optimization. I possess a strong legal background that grants me an analytical edge in contract and risk management. Proficient in data analysis tools. A track record of building strategic partnerships with suppliers, reducing purchasing costs by record percentages, and ensuring inventory efficiency with the highest quality standards.">
        </p>
    </div>

    <div class="grid-buttons">
        <button onclick="openModal('modal-exp')" data-ar="الخبرات العملية" data-en="Work Experience">الخبرات العملية</button>
        <button onclick="openModal('modal-insights')" data-ar="رؤيتي المهنية" data-en="Professional Insights">رؤيتي المهنية</button>
        <button onclick="openModal('modal-philosophy')" data-ar="فلسفة الشراء" data-en="Procurement Philosophy">فلسفة الشراء</button>
        <button onclick="openModal('modal-skills')" data-ar="المهارات" data-en="Skills">المهارات</button>
        <button onclick="openModal('modal-education')" data-ar="التعليم" data-en="Education">التعليم</button>
        <button onclick="openModal('modal-challenges')" data-ar="التحديات" data-en="Challenges">التحديات</button>
        <button onclick="openModal('modal-kpi')" data-ar="مؤشرات الأداء" data-en="KPIs">مؤشرات الأداء</button>
        <button onclick="openModal('modal-contact')" data-ar="اتصل بي" data-en="Contact">اتصل بي</button>
    </div>

    <!-- Modals Content -->
    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <span class="close" onclick="closeModal()">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Data Containers -->
    <div id="modal-exp" style="display:none">
        <h2 data-ar="الخبرات العملية" data-en="Work Experience">الخبرات العملية</h2>
        <p><strong>Gate of the Car:</strong> Jan 2025 – Present...</p>
        <p><strong>Golden Star Group:</strong> Jan 2023 – Dec 2024...</p>
    </div>
    <div id="modal-insights" style="display:none">
        <h2 data-ar="رؤيتي المهنية" data-en="Professional Insights">رؤيتي المهنية</h2>
        <p>Legal Aspects & SRM Strategy...</p>
    </div>
    <!-- (بقية المحتوى يتم تعبئته بنفس الطريقة أدناه) -->

    <script src="script.js"></script>
</body>
</html>
